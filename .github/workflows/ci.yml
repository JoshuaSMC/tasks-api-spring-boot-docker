name: CI — Build, Test & Publish

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/tasks-api

jobs:
  build-test-publish:
    name: Build, Test y Publicar
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y testear
        run: mvn verify -q

      - name: Build imagen Docker (local)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          tags: tasks-api:${{ github.sha }}

      - name: Smoke test del contenedor
        run: |
          docker run -d --name test-container -p 8080:8080 tasks-api:${{ github.sha }}
          echo "Esperando que la API esté lista..."
          HEALTHY=false
          for i in {1..12}; do
            if curl -sf http://localhost:8080/actuator/health; then
              echo "API lista"
              HEALTHY=true
              break
            fi
            echo "Intento $i/12 — reintentando en 5s..."
            sleep 5
          done
          docker stop test-container || true
          if [ "$HEALTHY" = "false" ]; then
            echo "La API no respondió después de 60 segundos"
            exit 1
          fi

      - name: Login a GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push a GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_LC=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag tasks-api:${{ github.sha }} ${IMAGE_LC}:latest
          docker tag tasks-api:${{ github.sha }} ${IMAGE_LC}:${{ github.sha }}
          docker push ${IMAGE_LC}:latest
          docker push ${IMAGE_LC}:${{ github.sha }}

      - name: Deploy a Render
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Deploy disparado — esperando que Render levante..."
          HEALTHY=false
          for i in {1..18}; do
            if curl -sf https://tasks-api-f4b9.onrender.com/actuator/health | grep -q '"status":"UP"'; then
              echo "Deploy exitoso — https://tasks-api-f4b9.onrender.com"
              HEALTHY=true
              break
            fi
            echo "Intento $i/18 — reintentando en 10s..."
            sleep 10
          done
          if [ "$HEALTHY" = "false" ]; then
            echo "Render no respondió después de 3 minutos"
            exit 1
          fi
